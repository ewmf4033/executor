# Phase 4.9 Item 6: logrotate config for all executor-written /var/log files.
# Install to /etc/logrotate.d/executor:
#   cp /root/executor/systemd/logrotate-executor.conf /etc/logrotate.d/executor
# Verify:
#   logrotate -d /etc/logrotate.d/executor
# /etc/cron.daily/logrotate is the system default invocation.
#
# - copytruncate: safe for long-running daemons that append to a single fd
#   without SIGHUP-based reopen (matches data-recorder's approach).
# - delaycompress: first rotation stays uncompressed for 24h so tailing
#   still works while the issue is fresh.
# - 14-day retention: sufficient for post-mortem of the recent paper-mode
#   run; log growth is ~10-50MB/day so worst-case ~700MB retained.
/var/log/executor.log
/var/log/executor-reconciliation.log
/var/log/executor-canary.log
/var/log/executor-digest.log
/var/log/droplet-backup.log {
    su root root
    daily
    rotate 14
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
}
