# Risk policy overrides. See executor/risk/config.py for shape + defaults.
# Code defaults are deliberately conservative; override here to go live.
#
# Reload: send SIGHUP to the executor process, or issue /risk reload via
# Telegram (Phase 4). A CONFIG_RELOADED audit event is emitted on every
# successful reload with the new config's SHA256 fingerprint.

structural:
  min_edge_default: "0.01"
  per_strategy_min_edge: {}

venue_health:
  window_sec: 60
  trip_threshold: 2
  pause_sec: 120

per_intent:
  max_intent_dollars: "250.00"

liquidity:
  depth_levels: 3
  min_remainder_contracts: "1"

market_exposure:
  default_ceiling_dollars: "500.00"
  per_key: {}

event_concentration:
  default_ceiling_dollars: "1000.00"
  per_key: {}

venue_exposure:
  default_ceiling_dollars: "2500.00"
  per_key: {}

global_portfolio_dollars: "10000.00"

strategy_allocation:
  default_ceiling_dollars: "1000.00"
  per_key: {}

daily_loss:
  default_max_loss_dollars: "200.00"
  per_strategy: {}

clip_floor:
  min_final_ratio: "0.5"

poisoning:
  enabled: true
  detector: "zscore"
  window_sec: 3600
  z_threshold: 5.0
  pause_sec: 300
  min_samples: 20
  detector_kwargs: {}

# Phase 4 — 0e adverse-selection detector
adverse_selection:
  window: 20
  adverse_threshold: 0.60
  move_threshold_sigma: 2.0
  pause_sec: 300

# Phase 4 — kill switch behavior
kill_switch:
  auto_resume_strike_limit: 3
  panic_cooldown_sec: 300

# Phase 4 — execution attribution
attribution:
  exit_horizon_sec: 300

# Phase 4.14b — dead-man gate (operator availability, Gate 8.5).
dead_man:
  enabled: false
  default_timeout_sec: 21600  # 6h
  min_timeout_sec: 300        # 5m
  max_timeout_sec: 43200      # 12h

# Phase 4.14c — Telegram polling watchdog.
telegram:
  watchdog:
    enabled: true
    stall_threshold_sec: 120
    poll_interval_sec: 10
    max_restarts: 3
    restart_window_sec: 300
    escalate_on_max: true

# Phase 4.15 — fee-aware executable-edge gate (slot 1.5).
# bps-of-notional placeholder; Phase 5a replaces with venue-native fees.
# In paper mode the gate is bypassed unless apply_in_paper_mode=true.
fee_gate:
  enabled: true
  apply_in_paper_mode: false
  default_fee_bps: "0"
  safety_margin_bps: "0"
  per_market_fee_bps: {}
  per_series_fee_bps: {}

# Phase 4.15 — order-policy gate (slot 1.6). Validates leg.metadata
# bridge keys: tif/time_in_force, order_group_id, buy_max_cost,
# post_only, reduce_only. Paper mode is permissive about absence of
# metadata, strict about explicit unsafe metadata.
order_policy:
  enabled: true
  apply_in_paper_mode: false
  allowed_time_in_force: ["IOC", "FOK"]
  forbid_post_only: true
  forbid_reduce_only: false
  require_order_group_id_in_capital_mode: true
  require_buy_max_cost_for_buys_in_capital_mode: true
